name: Build CoreTerm APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # ഇവിടെയുണ്ടായിരുന്ന cache ലൈൻ നമ്മൾ ഒഴിവാക്കി

      - name: Grant execute permission for gradlew
        run: chmod +x CoreTermCLI/gradlew

      - name: Build Debug APK
        run: ./CoreTermCLI/gradlew assembleDebug -p CoreTermCLI

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoreTerm-CLI-APK
          path: CoreTermCLI/app/build/outputs/apk/debug/*.apk
